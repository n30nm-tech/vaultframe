services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      APP_DATA_DIR: ${APP_DATA_DIR:-/app/data}
    ports:
      - "${APP_PORT:-3000}:3000"
    restart: unless-stopped
    volumes:
      - app_data:/app/data

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-media_library}
      POSTGRES_USER: ${POSTGRES_USER:-media}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-media}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-media} -d ${POSTGRES_DB:-media_library}"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  app_data:
  postgres_data:
